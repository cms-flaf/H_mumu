
[meta]
results_dir = "/eos/user/a/ayeagle/H_mumu/results/OGDNN"
use_cuda = true

[dataset]
vbf_score_cut = 0
equalize_for_training = true
equalize_per_process = false
renorm_inputs = true
signal_types = ['VBFHto2Mu', 'GluGluHto2Mu']
abs_train_weight = false
data_columns = [
    'mu1_eta',
    'mu1_pt',
    'mu2_eta',
    'mu2_pt',
    'dR_mumu',
    'm_mumu',
    'eta_mumu',
    'cosTheta_CS',
    'phi_mumu',
    'pt_mumu',
    'y_mumu',
    'phi_CS',
    'R_pt',
    'minDeltaEtaSigned',
    'minDeltaPhi',
    'Zeppenfeld_Var',
    'pt_centrality',
    'j1_eta',
    'j1_pt',
    'j1_btagPNetQvG',
    'j2_eta',
    'j2_pt',
    'j2_btagPNetQvG',
    'm_jj',
    'delta_eta_jj',
    'pt_jj'
]

[splitting]
validation_size = 0.25
k = 4

[network]  
# Hidden layers only, input layer size pulled from the used columns
layer_list = [64, 64, 32, 32]
batch_renorm = false
dropout = 0.00

[training]
batch_size = 10000
epochs = 1
early_stop = true
patience = 10

[optimizer]
algo = "Adam"   # Currently, SGD and Adam are supported
lr = 0.001
weight_decay = 0.0

[testing]
# Number of bins for all histograms
n_bins = 24
feature_import = false


